services:
  nginx-proxy:
    image: nginx:alpine
    container_name: server-nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx-proxy/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dashboard-frontend:/usr/share/nginx/html:ro
    depends_on:
      - notification-service
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 50M

  notification-service:
    build: ./notification-service
    container_name: server-notification-container
    env_file:
      - .env
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 150M

  metrics-collector:
    build: ./metrics-collector
    container_name: server-metrics-container
    depends_on:
      - notification-service
    volumes:
      - /proc:/host/proc:ro
      - /:/host/root:ro
    env_file:
      - .env
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.15'
          memory: 80M
